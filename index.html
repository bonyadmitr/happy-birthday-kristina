<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#ff7eb3" />
  <link
    rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%82%3C/text%3E%3C/svg%3E"
  />
  <title>С днём рождения 🎂</title>
  <meta name="description" content="Поздравление с днём рождения" />

  <!-- PWA: манифест + иконки. Пути относительные — сайт живёт в подпапке GitHub Pages. -->
  <link rel="manifest" href="manifest.json" />
  <!-- iOS частично игнорирует манифест: установку на «Домой» держат apple-теги ниже. -->
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Кристине" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500;1,600&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Фон-атмосфера отдельным фиксированным слоем (без background-attachment:fixed) -->
  <div class="bg" aria-hidden="true"></div>

  <!-- Слой конфетти (canvas создаётся библиотекой поверх всего) -->

  <!-- 1. Экран распаковки подарка -->
  <div id="gift-screen" class="gift-screen">
    <div class="gift" id="gift" role="button" tabindex="0" aria-label="Открыть подарок">
      <div class="gift-lid">
        <div class="bow">
          <span class="bow-loop bow-left"></span>
          <span class="bow-loop bow-right"></span>
          <span class="bow-knot"></span>
        </div>
      </div>
      <div class="gift-box">
        <div class="gift-ribbon-v"></div>
      </div>
      <div class="gift-ribbon-h"></div>
    </div>
    <p class="gift-hint" id="gift-hint">Нажми на подарок 🎁</p>
  </div>

  <!-- Плавающие частицы (шарики/сердечки) -->
  <div class="floaties" id="floaties" aria-hidden="true"></div>

  <!-- Основной контент -->
  <main id="site" class="site" hidden>
    <!-- 2. Hero -->
    <section class="section hero" id="hero">
      <p class="hero-greeting reveal" id="hero-greeting">С днём рождения,</p>
      <h1 class="hero-name reveal" id="hero-name">Кристина</h1>
      <p class="hero-subtitle reveal" id="hero-subtitle"></p>
      <div class="scroll-cue reveal" aria-hidden="true">
        <span>листай вниз</span>
        <span class="chevron"></span>
      </div>
    </section>

    <!-- Финал: одна буква «Л» + ритм-игра над ней -->
    <section class="section finale" id="finale">
      <!-- Полоса + комбо НАД буквой: чтобы рука при тапе по «Л» её не закрывала -->
      <div class="rhythm" id="rhythm" hidden>
        <p class="rhythm-combo" id="rhythm-combo" aria-live="polite"></p>
        <div class="rhythm-lane" id="rhythm-lane">
          <span class="rhythm-target" id="rhythm-target" aria-hidden="true"></span>
        </div>
      </div>

      <div class="finale-letter reveal" id="finale-letter" role="button" tabindex="0"
        aria-label="Наше «люблю»"></div>
      <p class="finale-caption reveal" id="finale-caption" hidden></p>

      <!-- Ритм-игра (idle): призыв + кнопка старта -->
      <p class="rhythm-hint" id="rhythm-hint" hidden></p>
      <button class="btn-play" id="btn-play" type="button" hidden></button>

      <button class="btn-replay" id="btn-replay" type="button"></button>
    </section>
  </main>

  <!-- Музыкальная кнопка (появляется, если задана музыка) -->
  <button class="music-toggle" id="music-toggle" type="button" hidden aria-label="Музыка">
    <span class="music-icon">♪</span>
  </button>

  <audio id="bg-audio" loop preload="none"></audio>

  <script src="js/config.js"></script>
  <script src="js/confetti.js"></script>
  <script src="js/rhythm-beatmap.js"></script>
  <script src="js/rhythm.js"></script>
  <script src="js/main.js"></script>

  <!-- PWA: тихая регистрация service worker (офлайн). Не на file:// — иначе ошибка
       при прямом открытии файла. Без UI: установка через нативное меню браузера. -->
  <script>
    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
